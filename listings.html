﻿﻿<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All Listings — SkyLife Aircrafts</title>
<meta name="description" content="Browse all available private aircraft for sale at SkyLife Aircrafts. Pistons, turboprops, and jets across Canada.">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #0a1628;
  --navy2: #0f1f38;
  --navy3: #162847;
  --teal: #3ecfb2;
  --teal2: #2ab09a;
  --teal3: #1a8070;
  --mint: #a8f0e6;
  --white: #f5f7fa;
  --muted: rgba(245,247,250,0.55);
  --border: rgba(62,207,178,0.18);
  --font-display: 'Cormorant Garamond', Georgia, serif;
  --font-body: 'DM Sans', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--navy);
  color: var(--white);
  font-family: var(--font-body);
  font-size: 15px;
  line-height: 1.6;
  overflow-x: hidden;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
  opacity: 0.5;
}

/* ─── NAV (from header partial) ─── */
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  padding: 0 48px;
  height: 160px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: #ffffff;
  border-bottom: 1px solid rgba(62,207,178,0.3);
}
.nav-logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
.logo-img { height: 144px; width: auto; border-radius: 4px; }
.nav-brand { font-family: var(--font-display); font-size: 22px; font-weight: 600; letter-spacing: 0.5px; color: var(--navy); line-height: 1; }
.nav-brand span { color: var(--teal2); }
.nav-links { display: flex; align-items: center; gap: 36px; list-style: none; }
.nav-links a { font-size: 16px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; color: var(--navy); text-decoration: none; transition: color 0.2s; }
.nav-links a:hover, .nav-links a.active { color: var(--teal2); }
.nav-cta { background: transparent; border: 1.5px solid var(--teal2); color: var(--teal2) !important; padding: 12px 30px; border-radius: 2px; font-size: 15px !important; letter-spacing: 1.5px !important; cursor: pointer; transition: all 0.2s !important; }
.nav-cta:hover { background: var(--teal2) !important; color: white !important; }
.hamburger { display: none; flex-direction: column; gap: 5px; background: none; border: none; cursor: pointer; padding: 8px; z-index: 200; }
.hamburger span { display: block; width: 26px; height: 2px; background: var(--navy); border-radius: 2px; transition: all 0.3s; }
.hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
.hamburger.open span:nth-child(2) { opacity: 0; }
.hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
.mobile-menu { display: none; position: fixed; top: 0; right: -100%; width: 80%; max-width: 320px; height: 100vh; background: #ffffff; z-index: 300; padding: 100px 36px 48px; transition: right 0.35s cubic-bezier(0.25,0.8,0.25,1); box-shadow: -4px 0 40px rgba(0,0,0,0.12); }
.mobile-menu.open { right: 0; }
.mobile-menu ul { list-style: none; }
.mobile-menu li { border-bottom: 0.5px solid rgba(10,22,40,0.08); }
.mobile-menu a { display: block; padding: 18px 0; font-size: 17px; font-weight: 500; letter-spacing: 0.5px; color: var(--navy); text-decoration: none; text-transform: uppercase; transition: color 0.2s; }
.mobile-menu a:hover { color: var(--teal2); }
.mobile-cta { display: inline-block !important; margin-top: 28px; padding: 14px 32px !important; border: 1.5px solid var(--teal2) !important; color: var(--teal2) !important; border-radius: 2px; text-align: center; width: 100%; }
.mobile-close { position: absolute; top: 28px; right: 28px; background: none; border: none; font-size: 22px; color: var(--navy); cursor: pointer; line-height: 1; }
.mobile-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 299; backdrop-filter: blur(2px); }
.mobile-overlay.open, .mobile-menu.open { display: block; }

/* ─── FOOTER ─── */
footer { background: #06101d; padding: 60px 80px 32px; border-top: 0.5px solid var(--border); }
.footer-top { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 48px; margin-bottom: 48px; }
.footer-brand { font-family: var(--font-display); font-size: 28px; font-weight: 300; margin-bottom: 12px; }
.footer-brand span { color: var(--teal); }
.footer-desc { font-size: 13px; color: var(--muted); line-height: 1.8; max-width: 280px; }
.footer-col h4 { font-size: 10px; letter-spacing: 2.5px; text-transform: uppercase; color: var(--teal); margin-bottom: 20px; }
.footer-col ul { list-style: none; }
.footer-col li { margin-bottom: 10px; }
.footer-col a { color: var(--muted); text-decoration: none; font-size: 13px; transition: color 0.2s; }
.footer-col a:hover { color: var(--teal); }
.footer-bottom { border-top: 0.5px solid var(--border); padding-top: 24px; display: flex; justify-content: space-between; align-items: center; }
.footer-copy { font-size: 12px; color: var(--muted); }
.footer-legal { display: flex; gap: 24px; }
.footer-legal a { font-size: 12px; color: var(--muted); text-decoration: none; }

/* ─── PAGE HERO ─── */
.page-hero {
  position: relative;
  padding: 220px 80px 70px;
  background: linear-gradient(160deg, rgba(13,30,54,0.88) 0%, rgba(10,22,40,0.82) 50%, rgba(7,17,30,0.9) 100%), url('https://images.unsplash.com/photo-1684838200815-36eef38f353c?auto=format&fit=crop&w=1920&q=80');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  overflow: hidden;
  border-bottom: 0.5px solid var(--border);
  z-index: 1;
}
.page-hero-grid {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(62,207,178,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(62,207,178,0.04) 1px, transparent 1px);
  background-size: 80px 80px;
  mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 20%, transparent 80%);
}
.page-hero-orb {
  position: absolute;
  width: 500px; height: 500px;
  right: -80px; top: 50%;
  transform: translateY(-50%);
  border-radius: 50%;
  background: radial-gradient(circle, rgba(62,207,178,0.1) 0%, transparent 70%);
  filter: blur(50px);
}
.page-eyebrow {
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 11px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--teal);
  margin-bottom: 20px;
}
.page-eyebrow::before { content: ''; width: 32px; height: 1px; background: var(--teal); }
.page-title {
  font-family: var(--font-display);
  font-size: clamp(44px, 5vw, 72px);
  font-weight: 300;
  line-height: 1.05;
  letter-spacing: -0.5px;
  margin-bottom: 16px;
}
.page-title em { font-style: italic; color: var(--teal); }
.page-sub { font-size: 16px; color: var(--muted); font-weight: 300; }

/* ─── SEARCH BAR ─── */
.search-section {
  padding: 40px 80px;
  background: var(--navy3);
  border-bottom: 0.5px solid var(--border);
  position: relative;
  z-index: 1;
}
.search-row {
  display: grid;
  grid-template-columns: 2fr 1fr 1fr 1fr auto;
  gap: 12px;
  align-items: end;
  max-width: 1100px;
}
.search-field label { display: block; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--teal); margin-bottom: 8px; }
.search-field input, .search-field select { width: 100%; background: rgba(245,247,250,0.05); border: 0.5px solid var(--border); color: var(--white); padding: 12px 16px; font-family: var(--font-body); font-size: 14px; border-radius: 2px; outline: none; transition: border-color 0.2s; }
.search-field input::placeholder { color: var(--muted); }
.search-field input:focus, .search-field select:focus { border-color: var(--teal); }
.search-field select option { background: var(--navy2); }
.search-btn { background: var(--teal); border: none; color: var(--navy); padding: 12px 28px; font-family: var(--font-body); font-size: 13px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; border-radius: 2px; white-space: nowrap; transition: all 0.2s; }
.search-btn:hover { background: var(--mint); }
.search-clear { background: transparent; border: 0.5px solid var(--border); color: var(--muted); padding: 12px 16px; font-family: var(--font-body); font-size: 13px; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; border-radius: 2px; white-space: nowrap; transition: all 0.2s; margin-left: 8px; }
.search-clear:hover { border-color: var(--teal); color: var(--teal); }

/* ─── LISTINGS SECTION ─── */
.listings-page-section {
  padding: 60px 80px 100px;
  position: relative;
  z-index: 1;
}

/* filter bar */
.filter-bar { display: flex; gap: 8px; margin-bottom: 36px; flex-wrap: wrap; align-items: center; }
.filter-btn { background: transparent; border: 0.5px solid var(--border); color: var(--muted); padding: 8px 20px; font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; cursor: pointer; border-radius: 2px; font-family: var(--font-body); transition: all 0.2s; }
.filter-btn:hover, .filter-btn.active { background: rgba(62,207,178,0.1); border-color: var(--teal); color: var(--teal); }
.filter-count { margin-left: auto; font-size: 12px; color: var(--muted); letter-spacing: 1px; }

/* grid */
.listings-grid-full {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 24px;
  margin-bottom: 48px;
}

/* card */
.aircraft-card { background: var(--navy2); border: 0.5px solid var(--border); border-radius: 3px; overflow: hidden; transition: all 0.35s cubic-bezier(0.25,0.8,0.25,1); cursor: pointer; position: relative; }
.aircraft-card:hover { transform: translateY(-4px); border-color: rgba(62,207,178,0.4); box-shadow: 0 24px 60px rgba(0,0,0,0.4), 0 0 40px rgba(62,207,178,0.06); }
.aircraft-card::after { content: ''; position: absolute; inset: 0; border-radius: 3px; background: linear-gradient(135deg, rgba(62,207,178,0.04) 0%, transparent 60%); opacity: 0; transition: opacity 0.35s; }
.aircraft-card:hover::after { opacity: 1; }
.card-img { width: 100%; aspect-ratio: 16/10; overflow: hidden; position: relative; }
.card-img-inner { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
.aircraft-svg { width: 85%; height: auto; transition: transform 0.5s ease; filter: drop-shadow(0 8px 24px rgba(0,0,0,0.5)); }
.aircraft-card:hover .aircraft-svg { transform: scale(1.04) translateX(3px); }
.card-badge { position: absolute; top: 12px; left: 12px; background: var(--teal); color: var(--navy); font-size: 9px; font-weight: 500; letter-spacing: 1.5px; text-transform: uppercase; padding: 4px 10px; border-radius: 1px; }
.card-badge.featured { background: #e6c97a; color: #1a1200; }
.bg-slate { background: linear-gradient(160deg, #12203a 0%, #0d1a30 100%); }
.card-body { padding: 22px 24px 24px; }
.card-make { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--teal); margin-bottom: 6px; }
.card-name { font-family: var(--font-display); font-size: 22px; font-weight: 400; margin-bottom: 4px; line-height: 1.2; }
.card-year { font-size: 13px; color: var(--muted); margin-bottom: 16px; }
.card-specs { display: flex; gap: 0; border-top: 0.5px solid var(--border); border-bottom: 0.5px solid var(--border); margin-bottom: 18px; }
.spec { flex: 1; padding: 10px 0; text-align: center; border-right: 0.5px solid var(--border); }
.spec:last-child { border-right: none; }
.spec-val { font-family: var(--font-display); font-size: 16px; font-weight: 400; color: var(--white); line-height: 1; }
.spec-label { font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-top: 3px; }
.card-footer { display: flex; align-items: center; justify-content: space-between; }
.card-price { font-family: var(--font-display); font-size: 24px; font-weight: 300; color: var(--white); }
.card-price span { font-size: 13px; color: var(--muted); }
.card-btn { background: transparent; border: 0.5px solid var(--teal); color: var(--teal); padding: 8px 18px; font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; cursor: pointer; border-radius: 2px; font-family: var(--font-body); transition: all 0.2s; text-decoration: none; display: inline-block; }
.card-btn:hover { background: var(--teal); color: var(--navy); }

/* empty / loading states */
.state-msg { text-align: center; padding: 100px 0; color: var(--muted); font-size: 14px; letter-spacing: 2px; text-transform: uppercase; }
.state-msg span { display: block; font-family: var(--font-display); font-size: 32px; font-weight: 300; color: var(--white); letter-spacing: 0; text-transform: none; margin-bottom: 12px; }

/* load more */
.load-more-wrap { text-align: center; }
.load-more-btn { background: transparent; border: 0.5px solid var(--border); color: var(--muted); padding: 14px 48px; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; border-radius: 2px; font-family: var(--font-body); transition: all 0.2s; }
.load-more-btn:hover { border-color: var(--teal); color: var(--teal); }
.load-more-btn:disabled { opacity: 0.3; cursor: not-allowed; }

/* ─── ANIMATIONS ─── */
@keyframes fadeUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
.fade-up { opacity: 0; animation: fadeUp 0.7s ease both; }
.delay-1 { animation-delay: 0.05s; }
.delay-2 { animation-delay: 0.1s; }
.delay-3 { animation-delay: 0.15s; }
.delay-4 { animation-delay: 0.2s; }
.delay-5 { animation-delay: 0.25s; }
.delay-6 { animation-delay: 0.3s; }

/* ─── SCROLLBAR ─── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--navy); }
::-webkit-scrollbar-thumb { background: var(--teal3); border-radius: 3px; }

/* ─── RESPONSIVE ─── */
@media (max-width: 1024px) {
  nav { padding: 0 32px; height: 120px; }
  .logo-img { height: 110px; }
  .page-hero { padding: 180px 40px 60px; }
  .search-section { padding: 40px 40px; }
  .search-row { grid-template-columns: 1fr 1fr; gap: 14px; }
  .search-btn { grid-column: 1 / -1; width: 100%; padding: 14px; }
  .listings-page-section { padding: 48px 40px 80px; }
  .listings-grid-full { grid-template-columns: repeat(2, 1fr); }
  .footer-top { grid-template-columns: 1fr 1fr; gap: 40px; }
  footer { padding: 60px 40px 32px; }
}
@media (max-width: 768px) {
  nav { padding: 0 20px; height: 90px; }
  .logo-img { height: 72px; }
  .nav-links { display: none; }
  .hamburger { display: flex; }
  .page-hero { padding: 130px 24px 48px; }
  .page-title { font-size: clamp(34px, 9vw, 54px); }
  .search-section { padding: 32px 20px; }
  .search-row { grid-template-columns: 1fr; }
  .search-btn { grid-column: unset; }
  .listings-page-section { padding: 40px 20px 60px; }
  .listings-grid-full { grid-template-columns: 1fr; }
  .filter-count { margin-left: 0; }
  footer { padding: 60px 20px 32px; }
  .footer-top { grid-template-columns: 1fr; gap: 36px; }
  .footer-bottom { flex-direction: column; gap: 16px; text-align: center; }
}
@media (max-width: 480px) {
  nav { height: 80px; padding: 0 16px; }
  .logo-img { height: 62px; }
  .page-hero { padding: 110px 16px 40px; }
  .listings-page-section { padding: 32px 16px 48px; }
  .search-section { padding: 28px 16px; }
  footer { padding: 48px 16px 28px; }
}
</style>
</head>
<body>

<div id="site-header"></div>
<script>fetch("/header.html").then(r=>r.text()).then(h=>{document.getElementById("site-header").outerHTML=h;initMobileMenu();});</script>

<!-- Page Hero -->
<section class="page-hero">
  <div class="page-hero-grid"></div>
  <div class="page-hero-orb"></div>
  <div style="position:relative;z-index:2;">
    <div class="page-eyebrow">SkyLife Aircrafts</div>
    <h1 class="page-title">Available <em>Listings</em></h1>
    <p class="page-sub" id="hero-count">Browse our full inventory of private aircraft for sale across Canada.</p>
  </div>
</section>

<!-- Search Bar -->
<div class="search-section">
  <div class="search-row">
    <div class="search-field">
      <label>Make / Model</label>
      <input type="text" id="s-make" placeholder="e.g. Cessna, Piper, Beechcraft">
    </div>
    <div class="search-field">
      <label>Category</label>
      <select id="s-cat">
        <option value="">All Types</option>
        <option value="piston">Piston</option>
        <option value="turboprop">Turboprop</option>
        <option value="light_jet">Light Jet</option>
        <option value="heavy_jet">Heavy Jet</option>
        <option value="helicopter">Helicopter</option>
      </select>
    </div>
    <div class="search-field">
      <label>Max Price (CAD)</label>
      <select id="s-price">
        <option value="">Any Price</option>
        <option value="250000">Under $250K</option>
        <option value="500000">Under $500K</option>
        <option value="1000000">Under $1M</option>
        <option value="3000000">Under $3M</option>
        <option value="10000000">Under $10M</option>
      </select>
    </div>
    <div class="search-field">
      <label>Location</label>
      <input type="text" id="s-loc" placeholder="Province or city">
    </div>
    <div style="display:flex;gap:8px;align-items:flex-end;">
      <button class="search-btn" onclick="applySearch()">Search</button>
      <button class="search-clear" onclick="clearSearch()">Clear</button>
    </div>
  </div>
</div>

<!-- Listings -->
<section class="listings-page-section">
  <div class="filter-bar">
    <button class="filter-btn active" data-cat="">All Aircraft</button>
    <button class="filter-btn" data-cat="piston">Piston</button>
    <button class="filter-btn" data-cat="turboprop">Turboprop</button>
    <button class="filter-btn" data-cat="light_jet">Light Jet</button>
    <button class="filter-btn" data-cat="heavy_jet">Heavy Jet</button>
    <button class="filter-btn" data-cat="helicopter">Helicopter</button>
    <span class="filter-count" id="filter-count"></span>
  </div>

  <div id="listings-loading" class="state-msg">Loading aircraft&hellip;</div>
  <div id="listings-empty" class="state-msg" style="display:none;">
    <span>No aircraft found</span>
    Try adjusting your filters or <a href="/listings" style="color:var(--teal)">view all</a>
  </div>
  <div class="listings-grid-full" id="listings-grid" style="display:none;"></div>

  <div class="load-more-wrap" id="load-more-wrap" style="display:none;">
    <button class="load-more-btn" id="load-more-btn" onclick="loadMore()">Load More Aircraft</button>
  </div>
</section>

<div id="site-footer"></div>
<script>fetch("/footer.html").then(r=>r.text()).then(h=>{document.getElementById("site-footer").outerHTML=h;});</script>

<!-- Mobile menu overlay -->
<div class="mobile-overlay" id="mobileOverlay" onclick="closeMobileMenu()"></div>

function formatPrice(p) {
  if (!p) return 'Price on Request';
  if (p >= 1000000) return `<span>CAD</span> $${(p/1000000).toFixed(p%1000000===0?0:1)}M`;
  if (p >= 1000) return `<span>CAD</span> $${(p/1000).toFixed(0)}K`;
  return `<span>CAD</span> $${p.toLocaleString()}`;
}

function renderCard(a, delay) {
  const svg = svgByCategory[a.category] || svgByCategory['piston'];
  const specs = a.specs || {};
  const badge = a.featured
    ? '<span class="card-badge featured">Featured</span>'
    : '<span class="card-badge">Available</span>';
  const specHtml = [
    specs.seats        ? `<div class="spec"><div class="spec-val">${specs.seats}</div><div class="spec-label">Seats</div></div>` : '',
    specs.cruise_speed ? `<div class="spec"><div class="spec-val">${specs.cruise_speed}</div><div class="spec-label">KTAS</div></div>` : '',
    specs.range_nm     ? `<div class="spec"><div class="spec-val">${Number(specs.range_nm).toLocaleString()}</div><div class="spec-label">NM Range</div></div>` : '',
    specs.avionics     ? `<div class="spec"><div class="spec-val" style="font-size:11px">${specs.avionics.split(' ')[0]}</div><div class="spec-label">Avionics</div></div>` : ''
  ].filter(Boolean).join('');
  const subtitle = [a.location, a.total_time ? a.total_time.toLocaleString()+' TT' : '', specs.avionics || ''].filter(Boolean).join(' · ');

  return `
    <div class="aircraft-card fade-up ${delay}" onclick="window.location='/listing?id=${a.id}'">
      <div class="card-img bg-slate">
        ${badge}
        <div class="card-img-inner">${svg}</div>
      </div>
      <div class="card-body">
        <div class="card-make">${a.make} · ${a.category ? a.category.replace('_',' ') : ''}</div>
        <div class="card-name">${a.year} ${a.model}</div>
        <div class="card-year">${subtitle}</div>
        <div class="card-specs">${specHtml}</div>
        <div class="card-footer">
          <div><div class="card-price">${formatPrice(a.price)}</div></div>
          <a class="card-btn" href="/listing?id=${a.id}">View Details</a>
        </div>
      </div>
    </div>`;
}

// ─── STATE ────────────────────────────────────────────────────────────────────
const PAGE_SIZE = 12;
let allData = [];
let filtered = [];
let shown = 0;
let activeCategory = '';
let searchMake = '';
let searchMaxPrice = '';
let searchLocation = '';

// ─── FETCH ALL ────────────────────────────────────────────────────────────────
async function fetchAll() {
  const { data, error } = await sb
    .from('listings')
    .select('*')
    .eq('status', 'active')
    .order('featured', { ascending: false })
    .order('created_at', { ascending: false });

  if (error || !data) return [];
  return data;
}

function applyFilters() {
  filtered = allData.filter(a => {
    if (activeCategory && a.category !== activeCategory) return false;
    if (searchMake && !`${a.make} ${a.model}`.toLowerCase().includes(searchMake.toLowerCase())) return false;
    if (searchMaxPrice && a.price > Number(searchMaxPrice)) return false;
    if (searchLocation && !(a.location || '').toLowerCase().includes(searchLocation.toLowerCase())) return false;
    return true;
  });
}

function renderPage(reset) {
  const grid = document.getElementById('listings-grid');
  const empty = document.getElementById('listings-empty');
  const wrap = document.getElementById('load-more-wrap');
  const btn = document.getElementById('load-more-btn');
  const countEl = document.getElementById('filter-count');

  if (reset) { shown = 0; grid.innerHTML = ''; }

  countEl.textContent = `${filtered.length} aircraft`;
  document.getElementById('hero-count').textContent =
    `Showing ${filtered.length} aircraft available across Canada.`;

  if (filtered.length === 0) {
    grid.style.display = 'none';
    empty.style.display = 'block';
    wrap.style.display = 'none';
    return;
  }

  empty.style.display = 'none';
  grid.style.display = 'grid';

  const slice = filtered.slice(shown, shown + PAGE_SIZE);
  const delays = ['delay-1','delay-2','delay-3','delay-4','delay-5','delay-6'];
  grid.innerHTML += slice.map((a, i) => renderCard(a, delays[i % delays.length])).join('');
  shown += slice.length;

  wrap.style.display = shown < filtered.length ? 'block' : 'none';
  btn.disabled = false;
}

function loadMore() {
  document.getElementById('load-more-btn').disabled = true;
  renderPage(false);
}

function applySearch() {
  searchMake = document.getElementById('s-make').value.trim();
  searchMaxPrice = document.getElementById('s-price').value;
  searchLocation = document.getElementById('s-loc').value.trim();
  applyFilters();
  renderPage(true);
}

function clearSearch() {
  document.getElementById('s-make').value = '';
  document.getElementById('s-price').value = '';
  document.getElementById('s-loc').value = '';
  searchMake = ''; searchMaxPrice = ''; searchLocation = '';
  applyFilters();
  renderPage(true);
}

// ─── FILTER PILLS ─────────────────────────────────────────────────────────────
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeCategory = btn.dataset.cat;
    // sync category dropdown
    document.getElementById('s-cat').value = activeCategory;
    applyFilters();
    renderPage(true);
  });
});

// ─── SYNC DROPDOWN → PILL ─────────────────────────────────────────────────────
document.getElementById('s-cat').addEventListener('change', function() {
  activeCategory = this.value;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.cat === activeCategory);
  });
  applyFilters();
  renderPage(true);
});

// ─── INIT ─────────────────────────────────────────────────────────────────────
(async () => {
  allData = await fetchAll();
  document.getElementById('listings-loading').style.display = 'none';
  applyFilters();
  renderPage(true);
})();

// ─── MOBILE MENU ─────────────────────────────────────────────────────────────
function initMobileMenu() {
  const hamburger = document.querySelector('.hamburger');
  const mobileMenu = document.querySelector('.mobile-menu');
  const overlay = document.getElementById('mobileOverlay');
  if (!hamburger) return;
  hamburger.addEventListener('click', () => {
    hamburger.classList.toggle('open');
    mobileMenu.classList.toggle('open');
    overlay.classList.toggle('open');
    document.body.style.overflow = mobileMenu.classList.contains('open') ? 'hidden' : '';
  });
}
function closeMobileMenu() {
  document.querySelector('.hamburger')?.classList.remove('open');
  document.querySelector('.mobile-menu')?.classList.remove('open');
  document.getElementById('mobileOverlay')?.classList.remove('open');
  document.body.style.overflow = '';
}
</script>
